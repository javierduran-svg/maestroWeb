services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maestroweb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-maestroweb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maestroweb} -d ${POSTGRES_DB:-maestroweb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-maestroweb}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-maestroweb}
      PRODUCTION: "1"
      BEHIND_PROXY: "1"
      FLASK_ENV: production
    ports:
      # Solo localhost: nginx del servidor hace HTTPS y proxy a erp.bgreenchile.cl
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
