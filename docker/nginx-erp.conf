# Sitio nginx para MaestroWeb en el mismo VPS que la landing.
# Instalar en el servidor:
#   sudo cp docker/nginx-erp.conf /etc/nginx/sites-available/erp.bgreenchile.cl
#   sudo ln -sf /etc/nginx/sites-available/erp.bgreenchile.cl /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d erp.bgreenchile.cl

server {
    listen 80;
    listen [::]:80;
    server_name erp.bgreenchile.cl;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
